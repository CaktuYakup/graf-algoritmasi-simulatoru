<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graf Algoritması Simülatörü PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <div class="container mt-4 text-center">
        <h1>Graf Algoritması Simülatörü</h1>
        <p class="text-muted mb-1 small">Sol Tık: Düğüm Ekle | Sağ Tık: Sil | Kırmızı Sayıya Tıkla: Ağırlık/Yön Güncelle</p>
    </div>

    <div class="container mb-3">
        <div class="card shadow-sm border-0 p-3">
            <div class="row g-3 align-items-center justify-content-between">
                <div class="col-auto d-flex gap-3 align-items-center flex-wrap">
                    <div class="d-flex align-items-center gap-2">
                        <label class="fw-bold mb-0">Algoritma:</label>
                        <select id="algorithm-select" class="form-select w-auto shadow-sm">
                            <option value="dijkstra">Dijkstra (En Kısa Yol)</option>
                            <option value="bellman-ford">Bellman-Ford (En Kısa Yol)</option>
                            <option value="prim">Prim (MST)</option>
                            <option value="kruskal">Kruskal (MST)</option>
                        </select>
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <label class="fw-bold mb-0">Başlangıç:</label>
                        <input type="number" id="start-node-input" class="form-control shadow-sm" style="width: 75px;" placeholder="No" min="1">
                    </div>
                </div>

                <div class="col-auto d-flex gap-3 align-items-center flex-wrap">
                    <div class="d-flex align-items-center gap-2 bg-white px-2 py-1 rounded border shadow-sm">
                        <label class="fw-bold mb-0 small text-uppercase text-muted">Hız:</label>
                        <input type="range" class="form-range" id="speed-slider" min="10" max="200" value="100" style="width: 80px;">
                    </div>
                </div>

                <div class="col-auto d-flex gap-2">
                    <button id="run-btn" class="btn btn-success fw-bold px-4 shadow-sm">ÇALIŞTIR</button>
                    <button id="cancel-btn" class="btn btn-warning fw-bold px-3 shadow-sm" disabled>DURDUR</button>
                    <button id="clear-btn" class="btn btn-danger fw-bold shadow-sm">TEMİZLE</button>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div id="graph-container" class="shadow-sm border rounded bg-white"></div>
    </div>

    <div class="container mt-3 mb-5" id="log-container" style="display: none;">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-dark text-white fw-bold py-2 small d-flex justify-content-between align-items-center px-3">
                <span>CANLI ADIM TAKİBİ</span>
                <span id="log-status" class="badge bg-warning text-dark">Bekliyor </span>
            </div>
            <div class="card-body p-0" style="max-height: 250px; overflow-y: auto;" id="log-scroll-area">
                <table class="table table-sm table-striped table-hover mb-0 text-start" id="log-table">
                    <thead class="table-light position-sticky top-0">
                        <tr><th width="8%" class="px-3">#</th><th width="35%">İŞLEM</th><th width="57%">VERİ DURUMU</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="weightModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content shadow-lg border-0">
                <div class="modal-header bg-dark text-white py-2"><h6 class="modal-title" id="weight-modal-title">Yol Ayarları</h6></div>
                <div class="modal-body text-center bg-light pb-2">
                    <p class="small text-muted mb-1 fw-bold text-uppercase">Maliyet (Ağırlık)</p>
                    <input type="number" id="edge-weight-input" class="form-control text-center fs-3 fw-bold mb-3 border-primary shadow-sm" value="1">
                    <p class="small text-muted mb-1 fw-bold text-uppercase">Yön Tipi</p>
                    <div class="btn-group w-100" role="group">
                        <input type="radio" class="btn-check" name="direction-radio" id="radio-directed" value="directed">
                        <label class="btn btn-outline-primary fw-bold" for="radio-directed">TEK YÖN ➔</label>
                        <input type="radio" class="btn-check" name="direction-radio" id="radio-bidirectional" value="bidirectional" checked>
                        <label class="btn btn-outline-primary fw-bold" for="radio-bidirectional">ÇİFT YÖN ↔</label>
                    </div>
                </div>
                <div class="modal-footer border-0 pt-1 pb-3 justify-content-center">
                    <button type="button" class="btn btn-success px-4 fw-bold shadow-sm" id="save-weight-btn">UYGULA</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="alertModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered"><div class="modal-content border-0 shadow-lg"><div class="modal-header py-2" id="alert-modal-header"><h6 class="modal-title text-white" id="alert-modal-title"></h6></div><div class="modal-body" id="alert-message-text"></div><div class="modal-footer border-0 pt-0 pb-3 justify-content-center"><button type="button" class="btn btn-secondary px-4 shadow-sm" data-bs-dismiss="modal">Kapat</button></div></div></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <script src="js/utils.js"></script>
    <script src="js/graph.js"></script>
    <script src="js/algorithms/dijkstra.js"></script>
    <script src="js/algorithms/bellman-ford.js"></script>
    <script src="js/algorithms/prim.js"></script>
    <script src="js/algorithms/kruskal.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
